<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Milestone Update</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; background: #f6f7fb; }
    .wrap { max-width: 760px; margin: 24px auto; padding: 16px; }
    .card { background: white; border-radius: 16px; padding: 18px; box-shadow: 0 6px 20px rgba(0,0,0,.06); }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .muted { color: #667; font-size: 13px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    button { border: 1px solid #dde; background: #fff; padding: 12px 12px; border-radius: 12px; cursor: pointer; font-weight: 600; }
    button.primary { border-color: #cdd; }
    button.selected { outline: 3px solid rgba(0, 120, 255, .25); border-color: #7aa; }
    .field { margin-top: 14px; }
    label { display: block; font-size: 13px; color: #445; margin-bottom: 6px; }
    select, textarea { width: 100%; border-radius: 12px; border: 1px solid #dde; padding: 10px; font-size: 14px; }
    textarea { min-height: 90px; resize: vertical; }
    .actions { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
    .cta { background: #111; color: #fff; border-color: #111; }
    .status { margin-top: 12px; font-size: 14px; }
    .ok { color: #0a6; }
    .err { color: #c22; }
    .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #eef2ff; font-size: 12px; margin-top: 8px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 6px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Milestone Update</h1>
      <div class="muted" id="sub">Loading…</div>

      <div class="grid" id="context" style="display:none;">
        <div class="pill" id="orderPill"></div>
        <div class="muted" id="locs"></div>
      </div>

      <div class="row" id="buttons" style="display:none;">
        <button id="arrivedBtn" class="primary"></button>
        <button id="departedBtn" class="primary"></button>
        <button id="delayBtn" class="primary">Delay</button>
      </div>

      <div id="delayFields" style="display:none;">
        <div class="field">
          <label for="reason">Delay reason</label>
          <select id="reason">
            <option value="">Select a reason</option>
            <option>Traffic</option>
            <option>Vehicle breakdown</option>
            <option>Waiting time at gate</option>
            <option>Documentation issue</option>
            <option>Customer not ready</option>
            <option>Weather</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label for="notes">Details (optional)</label>
          <textarea id="notes" placeholder="Add short details…"></textarea>
        </div>
      </div>

      <div class="actions" style="display:none;" id="actions">
        <button class="cta" id="submitBtn">Submit</button>
        <div class="muted" id="geoHint">We’ll ask for location on submit.</div>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
