<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Live Milestone Dashboard</title>

  <!-- Leaflet (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body{font-family:system-ui;margin:0;background:#f6f7fb}
    .wrap{max-width:1100px;margin:16px auto;padding:16px}
    .card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.06)}
    #map{height:560px;border-radius:14px}
    h1{margin:0 0 10px;font-size:18px}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .muted{color:#667;font-size:13px}
    .log{margin-top:10px;font-size:13px;max-height:160px;overflow:auto;background:#fafbff;border:1px solid #dde;border-radius:12px;padding:10px}
    .pill{display:inline-block;background:#eef2ff;border-radius:999px;padding:6px 10px;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <h1 id="title">Live Dashboard</h1>
        <span class="pill" id="orderPill"></span>
        <span class="muted" id="status">Connecting…</span>
      </div>

      <div id="map"></div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
