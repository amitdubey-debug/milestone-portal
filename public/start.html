<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Start Tracking</title>
  <style>
    :root{
      --bg:#f5f7ff; --card:#fff; --text:#0f172a; --muted:#5b6477; --border:#e6e9f5;
      --shadow:0 12px 30px rgba(15,23,42,.10); --shadow2:0 8px 18px rgba(15,23,42,.10);
      --radius:18px; --blue1:#4f46e5; --blue2:#7c3aed;
    }
    *{box-sizing:border-box}
    body{
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      margin:0;
      background: radial-gradient(1200px 600px at 20% 0%, #eef2ff 0%, transparent 60%),
                  radial-gradient(1200px 600px at 80% 0%, #fff7ed 0%, transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{max-width:760px;margin:18px auto;padding:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    h1{margin:0;font-size:18px}
    .muted{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.35}
    .grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px}
    .field label{display:block;font-size:12px;color:#334155;font-weight:800;margin-bottom:6px}
    .field input{
      width:100%;padding:12px;border-radius:14px;border:1px solid var(--border);
      font-size:14px;outline:none;background:#fff;
    }
    .row{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){ .row{grid-template-columns:1fr 1fr} }
    .btn{
      border:0;border-radius:16px;padding:12px 14px;cursor:pointer;font-weight:900;letter-spacing:.2px;
      color:#fff;box-shadow:var(--shadow2);
      background: linear-gradient(135deg,var(--blue1),var(--blue2));
      width:100%;
    }
    .btn:active{transform:translateY(1px)}
    .status{
      margin-top:12px;border-radius:14px;border:1px dashed var(--border);background:#fbfcff;
      padding:10px 12px;font-size:14px;
    }
    .err{color:#b91c1c;font-weight:900}
    .ok{color:#0a6;font-weight:900}
    a{color:#1d4ed8;font-weight:800;word-break:break-all}
    .note{margin-top:8px;color:var(--muted);font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Start Tracking (No Token)</h1>
      <div class="muted">
        Enter the Order Number and any one verification field (Pickup/Drop/Vendor Code/Phone).
        We’ll generate a token and open the same driver page.
      </div>

      <div class="grid">
        <div class="field">
          <label>Order Number *</label>
          <input id="orderNumber" placeholder="e.g. 686868678687" />
        </div>

        <div class="row">
          <div class="field">
            <label>Pickup Location (optional)</label>
            <input id="pickupLocation" placeholder="e.g. Bremerhaven Port" />
          </div>
          <div class="field">
            <label>Drop/Delivery Location (optional)</label>
            <input id="deliveryLocation" placeholder="e.g. Hamburg DC" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Vendor Code (optional)</label>
            <input id="vendorCode" placeholder="e.g. DE12345" />
          </div>
          <div class="field">
            <label>Driver Phone (optional)</label>
            <input id="phone" placeholder="+49..." />
          </div>
        </div>

        <div class="field">
          <label>Token TTL Minutes (optional)</label>
          <input id="ttl" placeholder="e.g. 1440 (1 day)" />
        </div>

        <button class="btn" id="goBtn">Generate Link & Open</button>

        <div class="status" id="status">Ready.</div>
        <div class="note">Tip: For production, you’d verify these values against an order system before issuing a token.</div>
      </div>
    </div>
  </div>

<script>
  const statusEl = document.getElementById("status");
  const goBtn = document.getElementById("goBtn");

  function setStatus(msg, kind){
    if (kind === "err") statusEl.innerHTML = `<span class="err">${msg}</span>`;
    else if (kind === "ok") statusEl.innerHTML = `<span class="ok">${msg}</span>`;
    else statusEl.textContent = msg;
  }

  goBtn.addEventListener("click", async () => {
    const orderNumber = document.getElementById("orderNumber").value.trim();
    const pickupLocation = document.getElementById("pickupLocation").value.trim();
    const deliveryLocation = document.getElementById("deliveryLocation").value.trim();
    const vendorCode = document.getElementById("vendorCode").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const ttlMinutes = document.getElementById("ttl").value.trim();

    if (!orderNumber) return setStatus("Order Number is required.", "err");
    if (!pickupLocation && !deliveryLocation && !vendorCode && !phone) {
      return setStatus("Provide at least one verification field: pickup/drop/vendor code/phone.", "err");
    }

    setStatus("Generating…");

    const r = await fetch("/api/start", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        orderNumber,
        pickupLocation,
        deliveryLocation,
        vendorCode,
        phone,
        ttlMinutes: ttlMinutes ? Number(ttlMinutes) : undefined
      })
    });

    const data = await r.json().catch(() => ({}));
    if (!r.ok) return setStatus(data.error || "Failed", "err");

    setStatus(`Link created: <a href="${data.link}">${data.link}</a>`, "ok");
    // open
    window.location.href = data.link;
  });
</script>
</body>
</html>
