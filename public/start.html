<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Open Driver Page</title>

  <style>
    :root{
      --bg:#f5f7ff; --card:#fff; --text:#0f172a; --muted:#5b6477; --border:#e6e9f5;
      --shadow:0 12px 30px rgba(15,23,42,.10); --shadow2:0 8px 18px rgba(15,23,42,.10);
      --radius:18px; --blue1:#4f46e5; --blue2:#7c3aed;
    }

    *{box-sizing:border-box}

    body{
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      margin:0;
      background: radial-gradient(1200px 600px at 20% 0%, #eef2ff 0%, transparent 60%),
                  radial-gradient(1200px 600px at 80% 0%, #fff7ed 0%, transparent 55%),
                  var(--bg);
      color:var(--text);
    }

    .wrap{max-width:680px;margin:40px auto;padding:14px}

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
    }

    h1{margin:0;font-size:20px}

    .muted{
      color:var(--muted);
      font-size:13px;
      margin-top:6px;
      line-height:1.4;
    }

    .grid{
      display:grid;
      gap:14px;
      margin-top:18px;
    }

    .field label{
      display:block;
      font-size:12px;
      font-weight:800;
      margin-bottom:6px;
    }

    .field input{
      width:100%;
      padding:13px;
      border-radius:14px;
      border:1px solid var(--border);
      font-size:14px;
      outline:none;
    }

    .field input:focus{
      border-color:#4f46e5;
      box-shadow:0 0 0 3px rgba(79,70,229,.15);
    }

    .btn{
      border:0;
      border-radius:16px;
      padding:14px;
      cursor:pointer;
      font-weight:900;
      letter-spacing:.2px;
      color:#fff;
      background:linear-gradient(135deg,var(--blue1),var(--blue2));
      box-shadow:var(--shadow2);
      width:100%;
      font-size:15px;
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      box-shadow:none;
    }

    .status{
      margin-top:12px;
      border-radius:14px;
      border:1px dashed var(--border);
      background:#fbfcff;
      padding:10px 12px;
      font-size:14px;
    }

    .err{color:#b91c1c;font-weight:900}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Open Driver Page</h1>
      <div class="muted">
        Enter the Order Number and Pick up location.  
        We’ll generate a secure token and open the One-Click update page.
      </div>

      <div class="grid">

        <div class="field">
          <label>Order Number *</label>
          <input id="orderNumber" placeholder="e.g. 686868678687" />
        </div>

        <div class="field">
          <label>Pick up location / city *</label>
          <input id="pickupLocation" placeholder="e.g. Bremerhaven Port" />
        </div>

        <button class="btn" id="goBtn">Open One-Click Page</button>

        <div class="status" id="status">Ready.</div>

      </div>
    </div>
  </div>

<script>
  const statusEl = document.getElementById("status");
  const goBtn = document.getElementById("goBtn");

  function setStatus(msg, isError){
    if(isError){
      statusEl.innerHTML = `<span class="err">${msg}</span>`;
    }else{
      statusEl.textContent = msg;
    }
  }

  async function openOneClick(){
    const orderNumber = document.getElementById("orderNumber").value.trim();
    const pickupLocation = document.getElementById("pickupLocation").value.trim();

    if(!orderNumber) return setStatus("Order Number is required.", true);
    if(!pickupLocation) return setStatus("Pick up location is required.", true);

    goBtn.disabled = true;
    setStatus("Generating secure link…");

    try{
      const r = await fetch("/api/start", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          orderNumber,
          pickupLocation,
          ttlMinutes: 60 * 24 * 7 // 7 days (optional)
        })
      });

      const data = await r.json().catch(()=>({}));

      if(!r.ok){
        goBtn.disabled = false;
        return setStatus(data.error || "Failed to generate link.", true);
      }

      // Direct redirect to OneClick page
      window.location.href = data.link;

    }catch(e){
      goBtn.disabled = false;
      setStatus("Network error. Please try again.", true);
    }
  }

  goBtn.addEventListener("click", openOneClick);

  // Enter key support
  ["orderNumber","pickupLocation"].forEach(id=>{
    document.getElementById(id).addEventListener("keydown", e=>{
      if(e.key === "Enter") openOneClick();
    });
  });
</script>

</body>
</html>
